{% extends "base.html" %}

{% block content %}
<div class="glass card" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="text-align: center; color: var(--primary-color);">New Member Registration</h2>
    
    {% if error %}
        <div class="badge badge-overdue" style="display: block; margin-bottom: 1rem; padding: 1rem;">{{ error }}</div>
    {% endif %}

    <form action="/register" method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div>
                <label for="name" style="font-weight: bold;">Full Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div>
                <label for="email" style="font-weight: bold;">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="phone" style="font-weight: bold;">Phone</label>
                <input type="text" id="phone" name="phone" required>
            </div>
            <div>
                <label for="dob" style="font-weight: bold;">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>
            <div>
                <label for="grade_class" style="font-weight: bold;">Class / Grade</label>
                <input type="text" id="grade_class" name="grade_class" required>
            </div>
            <div>
                <label for="roll_no" style="font-weight: bold;">Roll No (Optional)</label>
                <input type="text" id="roll_no" name="roll_no">
            </div>
            <div>
                <label for="profession" style="font-weight: bold;">Profession</label>
                <select id="profession" name="profession" required>
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div>
                <label for="password" style="font-weight: bold;">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1.5rem;">Register & Get Library ID &rarr;</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem;"><a href="/" style="color: var(--secondary-color); font-weight: bold;">Already have an ID? Login here</a></p>
</div>
{% endblock %}
